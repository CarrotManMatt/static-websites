name: Lint, type-check, build and deploy all websites

"on":
    pull_request:
        branches: [main]
    push:
        branches: [main]
    schedule:
        - cron: 48 5 * * 1
    workflow_dispatch: ~

concurrency:  # yamllint disable-line rule:key-ordering
    cancel-in-progress: true
    group: ${{github.workflow}}-${{github.event.pull_request.number || github.ref}}

permissions:
    contents: read

jobs:
    uv-check:
        name: Validate uv lockfile
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Check uv.lock (ensure all dependencies up to date)
              run: uv lock --check

    flake8:  # yamllint disable-line rule:key-ordering
        env:
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Lint code with Flake8
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Install Flake8 from locked dependencies
              run: uv sync --only-group lint-format

            - name: Run Flake8
              run: uv run -- flake8

    mypy:  # yamllint disable-line rule:key-ordering
        env:
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Type-check code with mypy
        needs: [uv-check]
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Install mypy from locked dependencies
              run: uv sync --no-group dev --group type-check

            - id: store-hashed-python-version
              name: Store hashed Python version
              run: echo "hashed_python_version=$(uv run -- python -VV | sha256sum | cut -d' ' -f1)"
                >> "$GITHUB_OUTPUT"

            - uses: actions/cache@v6
              with:
                key: mypy|${{steps.store-hashed-python-version.outputs.hashed_python_version}}
                path: ./.mypy_cache

            - name: Run mypy
              run: uv run -- mypy .

    pre-commit-PUSH:  # yamllint disable-line rule:key-ordering
        if: github.event_name == 'push'

        name: Verify pre-commit hooks (push)
        uses: ./.github/workflows/autofix-pre-commit.yaml
        with:
            skip-autofix: true

    pre-commit-PULL_REQUEST:  # yamllint disable-line rule:key-ordering
        if: github.event_name == 'pull_request'

        name: Verify pre-commit hooks and commit auto-fixes (pull_request)
        runs-on: ubuntu-latest

        steps:
            - timeout-minutes: 15
              uses: kachick/wait-other-jobs@v4.0.0
              with:
                skip-same-workflow: true
                wait-list: |
                    [
                        {
                            "workflowFile": "autofix-pre-commit.yaml",
                            "jobMatchMode": "prefix",
                            "jobName": "Run pre-commit hooks"
                        }
                    ]

    ruff-lint:  # yamllint disable-line rule:key-ordering
        env:
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Lint code with ruff
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Install ruff from locked dependencies
              run: uv sync --only-group lint-format

            - id: store-hashed-python-version
              name: Store hashed Python version
              run: echo "hashed_python_version=$(uv run -- python -VV | sha256sum | cut -d' ' -f1)"
                >> "$GITHUB_OUTPUT"

            - uses: actions/cache@v6
              with:
                key: ruff|${{steps.store-hashed-python-version.outputs.hashed_python_version}}
                path: ./.ruff_cache

            - name: Run ruff check
              run: uv run -- ruff check --no-fix --output-format=github

    build-and-deploy:  # yamllint disable-line rule:key-ordering
        env:
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        environment: deploy

        if: |
            always()
            && (
                github.event_name == 'push'
                || github.event_name == 'schedule'
                || github.event_name == 'workflow_dispatch'
            )
            && needs.flake8.result == 'success'
            && needs.mypy.result =='success'
            && (
                needs.pre-commit-PUSH.result == 'success'
                || needs.pre-commit-PULL_REQUEST.result == 'success'
            )
            && needs.ruff-lint.result == 'success'
            && needs.uv-check.result == 'success'

        name: Build and deploy all websites
        needs: [flake8, mypy, pre-commit-PUSH, pre-commit-PULL_REQUEST, ruff-lint, uv-check]
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.0
              with:
                enable-cache: true

            - name: Install project
              run: uv sync --no-group dev

            - uses: twingate/github-action@v1
              with:
                service-key: ${{secrets.TWINGATE_SERVICE_KEY}}

            - uses: webfactory/ssh-agent@v0.10.0
              with:
                ssh-private-key: ${{secrets.SSH_PRIVATE_KEY}}

            - env:
                STATIC_WEBSITES_BUILDER_REMOTE_DIRECTORY: ${{secrets.REMOTE_DIRECTORY}}
                STATIC_WEBSITES_BUILDER_REMOTE_IP: ${{secrets.REMOTE_IP}}
                STATIC_WEBSITES_BUILDER_REMOTE_USERNAME: ${{secrets.REMOTE_USERNAME}}
              name: Run build & deploy script
              run: uv run -m console
